<script>

let DATA=[],FILTER="";

// load data
fetch("data.json?v="+Date.now())
.then(r=>r.json())
.then(json=>DATA=json);

// highlight
function hl(text,q){
  if(!q || !text) return text;
  return text.replace(new RegExp(q,"ig"),m=>"<span class='hl'>"+m+"</span>");
}

// smart ranking
function rank(r,q){
  q=q.toLowerCase();
  if(r.sr && r.sr.toLowerCase()===q) return 100;
  if(r.sr && r.sr.toLowerCase().startsWith(q)) return 90;
  if(r.name && r.name.toLowerCase().startsWith(q)) return 80;
  if(r.name && r.name.toLowerCase().includes(q)) return 70;
  if(r.status && r.status.toLowerCase().includes(q)) return 60;
  return 0;
}

// search
function srch(q){
  if(!q) return [];
  q=q.toLowerCase();

  let res=DATA.filter(r=>{
    let ok=(r.sr&&r.sr.toLowerCase().includes(q))||
           (r.name&&r.name.toLowerCase().includes(q))||
           (r.status&&r.status.toLowerCase().includes(q));
    let f=FILTER? r.status===FILTER:true;
    return ok&&f;
  });

  return res.sort((a,b)=>rank(b,q)-rank(a,q));
}

// render MULTIPLE results
function render(list,q){
  let el=document.getElementById("results");

  if(!list.length){
    el.innerHTML="<p>No results found</p>";
    return;
  }

  el.innerHTML=list.map(r=>`
  <div class="card">

    <div class="header">
      <div><b>${hl(r.sr,q)}</b> ${hl(r.name||"",q)}</div>
      <div class="badge">${r.status}</div>
    </div>

    <div style="margin-top:10px;">
      <b>Subject:</b> ${r.subject||"-"}
    </div>

    <div class="grid">
      <div><b>Owner</b><br>${r.owner||"-"}</div>
      <div><b>Opened</b><br>${r.opened||"-"}</div>
      <div><b>Reopened</b><br>${r.reopened||"-"}</div>
      <div><b>Origin</b><br>${r.origin||"-"}</div>
    </div>

    <div style="margin-top:10px;">
      <b>Doctor ID:</b> ${r.doctorId||"-"}
    </div>

    <div style="margin-top:10px;">
      <b>Activity Timeline</b>
      <div class="timeline">
        ${(r.timeline||[]).map(c=>`
          <div class="timeline-item">
            <b style="color:#2563eb">${c.date||""}</b> ${hl(c.text||"",q)}
          </div>
        `).join("")}
      </div>
    </div>

  </div>
  `).join("");
}

// typing search
document.getElementById("search").addEventListener("input",function(){
  let q=this.value.trim();
  render(srch(q),q);
});

// chips
document.querySelectorAll(".chip").forEach(c=>{
  c.onclick=function(){
    document.querySelectorAll(".chip").forEach(x=>x.classList.remove("active"));

    if(FILTER===this.dataset.data){
      FILTER="";
    } else {
      FILTER=this.dataset.data;
      this.classList.add("active");
    }

    document.getElementById("search").dispatchEvent(new Event("input"));
  }
});

</script>
