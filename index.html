<!-- KEEP EVERYTHING SAME ABOVE... ONLY CHANGE SCRIPT PART -->

<script>

let DATA = [];
let IDX = {};

fetch('data.json?v=' + Date.now())
  .then(r => r.json())
  .then(json => {
    DATA = json;

    // Build index
    DATA.forEach(function(r){
      if(r.sr){
        IDX[r.sr.toLowerCase()] = r;
        IDX[r.sr.replace(/^SR/i,"").toLowerCase()] = r;
      }
    });
  });

var lq="";

// 🔍 SEARCH FUNCTION
function srch(q){
  q=(q||"").trim();
  if(!q)return[];
  var ql=q.toLowerCase();

  if(IDX[ql]) return [IDX[ql]];

  return DATA.filter(r =>
    (r.sr && r.sr.toLowerCase().includes(ql)) ||
    (r.name && r.name.toLowerCase().includes(ql)) ||
    (r.status && r.status.toLowerCase().includes(ql))
  );
}

// 🎨 CARD UI
function card(r){
return `
<div class="src">
  <div class="sch">
    <span class="srn">${r.sr}</span>
    <span class="snam">${r.name}</span>
    <span class="sst ${r.status.toLowerCase()}">${r.status}</span>
  </div>

  <div class="ssub">${r.subject || ''}</div>

  <div class="sflds">
    <div class="sfld"><b>Owner:</b> ${r.owner}</div>
    <div class="sfld"><b>Opened:</b> ${r.opened}</div>
  </div>
</div>
`;
}

// 🧠 RENDER
function render(res){
  const el = document.getElementById("hRes");

  if(!res.length){
    el.innerHTML = "No results found";
    return;
  }

  el.innerHTML = res.map(card).join("");
}

// 🔍 SEARCH INPUT
document.getElementById("hi").addEventListener("input", function(){
  const q = this.value;
  render(srch(q));
});

</script>
