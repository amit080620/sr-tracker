<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SR Tracker</title>

<style>
body{
  font-family:'Segoe UI',sans-serif;
  background:#f3f5f9;
  margin:0;
  padding:20px;
}

.container{
  max-width:900px;
  margin:auto;
}

h1{
  text-align:center;
}

/* SEARCH */
.search-box{
  position:relative;
  margin:20px 0;
}

.search-box input{
  width:100%;
  padding:14px 50px;
  border-radius:30px;
  border:2px solid #ddd;
}

.search-icon{
  position:absolute;
  left:15px;
  top:50%;
  transform:translateY(-50%);
}

/* CARD */
.card{
  background:white;
  border-radius:12px;
  margin-top:20px;
  overflow:hidden;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

/* HEADER */
.card-top{
  display:flex;
  justify-content:space-between;
  padding:15px 20px;
  align-items:center;
}

.badge{
  background:#facc15;
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
}

/* SUBJECT SECTION */
.subject{
  background:#f8fafc;
  padding:12px 20px;
  border-top:1px solid #eee;
  border-bottom:1px solid #eee;
  color:#555;
}

/* GRID */
.info{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  border-bottom:1px solid #eee;
}

.info div{
  padding:15px;
  border-right:1px solid #eee;
}

.info div:last-child{
  border-right:none;
}

.label{
  font-size:12px;
  color:#888;
}

.value{
  font-weight:500;
}

/* DOCTOR ID */
.doc{
  padding:15px 20px;
  border-bottom:1px solid #eee;
}

/* TIMELINE */
.timeline{
  padding:20px;
}

.timeline-title{
  font-size:12px;
  color:#888;
  margin-bottom:10px;
}

.timeline-item{
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

.dot{
  width:8px;
  height:8px;
  background:#2563eb;
  border-radius:50%;
  margin-top:6px;
}

.t-content{
  font-size:14px;
}

.date{
  font-weight:600;
  color:#2563eb;
  display:block;
  margin-bottom:3px;
}

.hl{
  background:yellow;
}

</style>
</head>

<body>

<div class="container">

<h1>🔍 SR Tracker</h1>

<div class="search-box">
  <span class="search-icon">🔍</span>
  <input id="search" placeholder="Search SR or Name">
</div>

<div id="results"></div>

</div>

<script>

let DATA=[];

fetch("data.json?v="+Date.now())
.then(r=>r.json())
.then(json=>DATA=json);

function hl(t,q){
  if(!q) return t;
  return t.replace(new RegExp(q,"ig"),m=>"<span class='hl'>"+m+"</span>");
}

function srch(q){
  q=q.toLowerCase();
  return DATA.filter(r=>
    (r.sr&&r.sr.toLowerCase().includes(q)) ||
    (r.name&&r.name.toLowerCase().includes(q))
  );
}

function render(list,q){

  let el=document.getElementById("results");

  if(!list.length){
    el.innerHTML="No results";
    return;
  }

  el.innerHTML=list.map(r=>`

  <div class="card">

    <div class="card-top">
      <div><b>${hl(r.sr,q)}</b> ${hl(r.name||"",q)}</div>
      <div class="badge">${r.status}</div>
    </div>

    <div class="subject">
      <b>SUBJECT & ISSUE</b><br>
      ${r.subject || "-"}
    </div>

    <div class="info">
      <div><span class="label">OWNER</span><br><span class="value">${r.owner}</span></div>
      <div><span class="label">OPENED</span><br><span class="value">${r.opened}</span></div>
      <div><span class="label">REOPENED</span><br><span class="value">${r.reopened || "-"}</span></div>
      <div><span class="label">ORIGIN</span><br><span class="value">${r.origin || "-"}</span></div>
    </div>

    <div class="doc">
      <span class="label">DOCTOR ID</span><br>
      ${r.doctor_id || "-"}
    </div>

    <div class="timeline">
      <div class="timeline-title">ACTIVITY TIMELINE</div>

      ${(r.comments||[]).map(c=>{

        let parts=c.split(" ");
        let date=parts[0];
        let text=parts.slice(1).join(" ");

        return `
        <div class="timeline-item">
          <div class="dot"></div>
          <div class="t-content">
            <span class="date">${date}</span>
            ${hl(text,q)}
          </div>
        </div>
        `;
      }).join("")}

    </div>

  </div>

  `).join("");
}

document.getElementById("search").addEventListener("input",function(){
  render(srch(this.value),this.value);
});

</script>

</body>
</html>
