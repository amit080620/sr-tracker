<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SR Tracker SaaS</title>

<style>
:root{
  --bg:#f4f6fb;
  --card:#fff;
  --primary:#2563eb;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Segoe UI;
  background:var(--bg);
}

/* Layout */
.app{
  display:grid;
  grid-template-columns:220px 1fr;
  min-height:100vh;
}

/* Sidebar */
.sidebar{
  background:#111827;
  color:white;
  padding:20px;
}
.sidebar h2{margin-bottom:20px;}
.sidebar div{
  margin:10px 0;
  color:#9ca3af;
  cursor:pointer;
}
.sidebar div:hover{color:white;}

/* Main */
.main{
  padding:20px;
}

/* Top */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.search-box{
  position:relative;
  width:350px;
}
.search-box input{
  width:100%;
  padding:10px 40px;
  border-radius:20px;
  border:1px solid #ddd;
}
.search-box span{
  position:absolute;
  left:10px;
  top:50%;
  transform:translateY(-50%);
}

/* Stats */
.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;
  margin-top:20px;
}
.stat{
  background:white;
  padding:15px;
  border-radius:10px;
}

/* Table */
.table{
  margin-top:20px;
  background:white;
  border-radius:10px;
  overflow:hidden;
}
.row{
  display:grid;
  grid-template-columns:1fr 1fr 1fr 1fr;
  padding:12px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}
.row:hover{background:#f9fafb;}

/* Detail */
.detail{
  margin-top:20px;
  background:white;
  padding:20px;
  border-radius:10px;
}

.badge{
  background:#facc15;
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
}

/* Timeline */
.timeline{
  border-left:2px solid #ddd;
  padding-left:10px;
}
.timeline div{
  margin-bottom:8px;
}

/* Mobile */
@media(max-width:800px){
  .app{grid-template-columns:1fr;}
  .sidebar{display:none;}
  .row{grid-template-columns:1fr 1fr;}
}
</style>
</head>

<body>

<div class="app">

<div class="sidebar">
  <h2>SR Tracker</h2>
  <div>Dashboard</div>
  <div>Cases</div>
</div>

<div class="main">

<div class="topbar">
  <h2>Dashboard</h2>
  <div class="search-box">
    <span>🔍</span>
    <input id="search" placeholder="Search SR or name">
  </div>
</div>

<div class="stats">
  <div class="stat">Total: <span id="total"></span></div>
  <div class="stat">Open: <span id="open"></span></div>
  <div class="stat">Closed: <span id="closed"></span></div>
</div>

<div id="table" class="table"></div>

<div id="detail"></div>

</div>
</div>

<script>
let DATA=[];

fetch("data.json?v="+Date.now())
.then(r=>r.json())
.then(json=>{
  DATA=json;
  stats();
  table(DATA);
});

function stats(){
  document.getElementById("total").innerText=DATA.length;
  document.getElementById("open").innerText=
    DATA.filter(x=>x.status!="Closed").length;
  document.getElementById("closed").innerText=
    DATA.filter(x=>x.status=="Closed").length;
}

function table(list){
  document.getElementById("table").innerHTML=
    list.map(r=>`
      <div class="row" onclick="detail('${r.sr}')">
        <div>${r.sr}</div>
        <div>${r.name||"-"}</div>
        <div>${r.owner||"-"}</div>
        <div>${r.status}</div>
      </div>
    `).join("");
}

function detail(sr){
  let r=DATA.find(x=>x.sr==sr);
  document.getElementById("detail").innerHTML=`
    <div class="detail">
      <h3>${r.sr} ${r.name}</h3>
      <div class="badge">${r.status}</div>

      <p><b>Subject:</b> ${r.subject||"-"}</p>
      <p><b>Owner:</b> ${r.owner||"-"}</p>
      <p><b>Opened:</b> ${r.opened||"-"}</p>

      <h4>Timeline</h4>
      <div class="timeline">
        ${(r.comments||[]).map(c=>`<div>${c}</div>`).join("")}
      </div>
    </div>
  `;
}

document.getElementById("search").addEventListener("input",function(){
  let q=this.value.toLowerCase();
  let res=DATA.filter(r=>
    (r.sr && r.sr.toLowerCase().includes(q)) ||
    (r.name && r.name.toLowerCase().includes(q))
  );
  table(res);
});
</script>

</body>
</html>
