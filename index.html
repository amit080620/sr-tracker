<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SR Tracker</title>

<style>
body{
  font-family:'Segoe UI',sans-serif;
  background:#f3f5f9;
  margin:0;
  padding:20px;
}

.container{
  max-width:720px;
  margin:auto;
}

/* SEARCH */
.search-box{
  position:relative;
  margin:20px 0;
}

.search-box input{
  width:100%;
  padding:14px 20px 14px 50px;
  border-radius:30px;
  border:2px solid #e5e7eb;
  font-size:15px;
  outline:none;
}

/* GOOGLE STYLE GLOW ICON */
.search-icon{
  position:absolute;
  left:15px;
  top:50%;
  transform:translateY(-50%);
  width:20px;
  height:20px;
  border-radius:50%;
  background:conic-gradient(#4285F4,#EA4335,#FBBC05,#34A853,#4285F4);
  animation:spin 3s linear infinite;
  filter:blur(1px);
}

@keyframes spin{
  100%{transform:translateY(-50%) rotate(360deg);}
}

/* CHIPS */
.chips{
  margin-top:10px;
}

.chip{
  display:inline-block;
  padding:6px 12px;
  margin:4px;
  border-radius:20px;
  background:#eef2ff;
  cursor:pointer;
  font-size:13px;
}

.chip.active{
  background:#2563eb;
  color:#fff;
}

/* CARD */
.card{
  background:white;
  border-radius:12px;
  margin-top:16px;
  overflow:hidden;
  box-shadow:0 3px 8px rgba(0,0,0,0.06);
  font-size:14px;
}

.card-top{
  display:flex;
  justify-content:space-between;
  padding:12px 16px;
}

.badge{
  background:#facc15;
  padding:4px 10px;
  border-radius:20px;
  font-size:11px;
}

.subject{
  background:#f8fafc;
  padding:10px 16px;
  border-top:1px solid #eee;
  border-bottom:1px solid #eee;
  font-size:13px;
}

.info{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  border-bottom:1px solid #eee;
}

.info div{
  padding:10px;
  border-right:1px solid #eee;
}

.info div:last-child{
  border-right:none;
}

.label{
  font-size:11px;
  color:#888;
}

.value{
  font-size:13px;
}

.doc{
  padding:10px 16px;
  border-bottom:1px solid #eee;
}

.timeline{
  padding:14px 16px;
}

.timeline-item{
  display:flex;
  gap:8px;
  margin-bottom:10px;
}

.dot{
  width:6px;
  height:6px;
  background:#2563eb;
  border-radius:50%;
  margin-top:6px;
}

.date{
  font-size:12px;
  color:#2563eb;
}

.text{
  font-size:13px;
}

.hl{background:yellow;}

@media(max-width:600px){
  .info{grid-template-columns:1fr 1fr;}
}
</style>
</head>

<body>

<div class="container">

<h2>SR Tracker</h2>

<div class="search-box">
  <div class="search-icon"></div>
  <input id="search" placeholder="Search SR number, name...">
</div>

<div class="chips">
  <span class="chip" data="reopen">Reopen</span>
  <span class="chip" data="closed">Closed</span>
  <span class="chip" data="working">Working</span>
  <span class="chip" data="resolution">Resolution</span>
  <span class="chip" data="waiting">Waiting</span>
</div>

<div id="results"></div>

</div>

<script>

let DATA=[],FILTER="";

fetch("data.json?v="+Date.now())
.then(r=>r.json())
.then(json=>DATA=json);

/* normalize status */
function normalize(s){
  return (s||"").toLowerCase().replace(/[^a-z]/g,"");
}

function hl(t,q){
  if(!q) return t;
  return t.replace(new RegExp(q,"ig"),m=>"<span class='hl'>"+m+"</span>");
}

function srch(q){
  q=q.toLowerCase();

  return DATA.filter(r=>{
    let matchSearch =
      (r.sr&&r.sr.toLowerCase().includes(q)) ||
      (r.name&&r.name.toLowerCase().includes(q));

    let matchFilter = FILTER
      ? normalize(r.status).includes(FILTER)
      : true;

    return matchSearch && matchFilter;
  });
}

function render(list,q){
  let el=document.getElementById("results");

  if(!list.length){
    el.innerHTML="No results";
    return;
  }

  el.innerHTML=list.map(r=>`

  <div class="card">

    <div class="card-top">
      <div><b>${hl(r.sr,q)}</b> ${hl(r.name||"",q)}</div>
      <div class="badge">${r.status}</div>
    </div>

    <div class="subject">
      <b>Subject & Issue</b><br>
      ${r.subject||"-"}
    </div>

    <div class="info">
      <div><span class="label">Owner</span><br><span class="value">${r.owner}</span></div>
      <div><span class="label">Opened</span><br><span class="value">${r.opened}</span></div>
      <div><span class="label">Reopened</span><br><span class="value">${r.reopened||"-"}</span></div>
      <div><span class="label">Origin</span><br><span class="value">${r.origin||"-"}</span></div>
    </div>

    <div class="doc">
      <span class="label">Doctor ID</span><br>
      ${r.doctor_id||"-"}
    </div>

    <div class="timeline">
      ${(r.comments||[]).map(c=>{
        let parts=c.split(" ");
        let date=parts[0];
        let text=parts.slice(1).join(" ");

        return `
        <div class="timeline-item">
          <div class="dot"></div>
          <div>
            <div class="date">${date}</div>
            <div class="text">${hl(text,q)}</div>
          </div>
        </div>`;
      }).join("")}
    </div>

  </div>

  `).join("");
}

document.getElementById("search").addEventListener("input",function(){
  render(srch(this.value),this.value);
});

/* CHIP FIX */
document.querySelectorAll(".chip").forEach(c=>{
  c.onclick=function(){

    if(FILTER===this.dataset.data){
      FILTER="";
      this.classList.remove("active");
    }else{
      FILTER=this.dataset.data;
      document.querySelectorAll(".chip").forEach(x=>x.classList.remove("active"));
      this.classList.add("active");
    }

    document.getElementById("search").dispatchEvent(new Event("input"));
  }
});

</script>

</body>
</html>
